<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGS Wine Explorer · Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f0e8de;
    }

    /* ── Header ── */
    #header {
      background: #3a0d18;
      color: #f5e6d3;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      z-index: 2000;
    }
    #header h1 { font-size: 1.25em; font-weight: normal; letter-spacing: 1px; }
    #header a {
      color: #c9956a;
      text-decoration: none;
      font-size: 0.85em;
      border: 1px solid #c9956a55;
      padding: 5px 14px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    #header a:hover { background: #c9956a22; border-color: #c9956a; }

    /* ── Map ── */
    #map-wrap { flex: 1; position: relative; overflow: hidden; }
    #map      { width: 100%; height: 100%; }

    /* ── Stats badge ── */
    #stats {
      position: absolute;
      bottom: 18px; left: 18px;
      background: rgba(58,13,24,0.85);
      color: #f5e6d3;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.80em;
      z-index: 800;
      backdrop-filter: blur(6px);
      pointer-events: none;
      letter-spacing: 0.4px;
    }

    /* ── Hint ── */
    #hint {
      position: absolute;
      bottom: 18px; right: 18px;
      background: rgba(58,13,24,0.82);
      color: #f5e6d3;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.80em;
      z-index: 800;
      pointer-events: none;
      transition: opacity 0.6s;
      letter-spacing: 0.3px;
    }
    #hint.hidden { opacity: 0; }

    /* ── Side panel ── */
    #panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 370px;
      background: #fff8f2;
      border-left: 1px solid #d4a96a44;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(.4,0,.2,1);
      z-index: 1500;
      box-shadow: -6px 0 30px rgba(0,0,0,0.2);
    }
    #panel.open { transform: translateX(0); }

    #panel-header {
      background: #3a0d18;
      color: #f5e6d3;
      padding: 16px 16px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #panel-flag   { font-size: 2.4em; line-height: 1; }
    #panel-meta   { flex: 1; min-width: 0; }
    #panel-meta h2 { font-size: 1.15em; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #panel-meta p  { font-size: 0.80em; color: #c9956a; margin-top: 3px; }
    #panel-close   { cursor: pointer; color: #c9956a; font-size: 1.2em; padding: 5px 8px; border-radius: 4px; flex-shrink: 0; }
    #panel-close:hover { background: rgba(255,255,255,0.12); }

    #panel-body { flex: 1; overflow-y: auto; padding: 14px; }

    .sec-title {
      font-size: 0.69em;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: #8b5e3c;
      border-bottom: 1px solid #e8d5b7;
      padding-bottom: 5px;
      margin: 16px 0 8px;
    }
    .sec-title:first-child { margin-top: 0; }

    .reg-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 8px; border-radius: 7px; cursor: pointer;
      transition: background 0.15s; margin: 1px 0;
    }
    .reg-row:hover  { background: #f0e0cc; }
    .reg-row.active { background: #e8d0b0; }
    .reg-name  { font-size: 0.88em; }
    .reg-count { font-size: 0.74em; color: #8b5e3c; background: #f0e0cc; padding: 2px 8px; border-radius: 10px; }

    .wine-row  { padding: 8px 0; border-bottom: 1px solid #e8d5b7; }
    .wine-row:last-child { border: none; }
    .wine-title { font-size: 0.87em; font-weight: bold; color: #1a0a00; }
    .wine-sub   { font-size: 0.75em; color: #8b5e3c; margin-top: 3px; }
    .score-pill {
      display: inline-block;
      background: #3a0d18; color: #f5e6d3;
      font-size: 0.70em; padding: 1px 7px;
      border-radius: 10px; margin-left: 5px; vertical-align: middle;
    }
    .type-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }

    #explore-btn {
      display: block; margin: 12px; padding: 11px;
      background: #3a0d18; color: #f5e6d3;
      text-align: center; text-decoration: none;
      border-radius: 8px; font-size: 0.88em;
      letter-spacing: 0.5px; transition: background 0.2s; flex-shrink: 0;
    }
    #explore-btn:hover { background: #5a1528; }

    /* Leaflet tooltip */
    .leaflet-tooltip {
      background: #3a0d18 !important;
      color: #f5e6d3 !important;
      border: none !important;
      border-radius: 8px !important;
      font-family: Georgia, serif !important;
      font-size: 0.86em !important;
      padding: 7px 13px !important;
      box-shadow: 0 3px 12px rgba(0,0,0,0.4) !important;
      pointer-events: none !important;
    }
    .leaflet-tooltip::before { border-top-color: #3a0d18 !important; }

    /* Scrollbar */
    #panel-body::-webkit-scrollbar { width: 5px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: #c9956a55; border-radius: 3px; }

    /* Loading overlay */
    #loading {
      position: absolute; inset: 0;
      background: rgba(240,232,222,0.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 1em; color: #3a0d18; letter-spacing: 1px;
      z-index: 900; pointer-events: none;
      transition: opacity 0.5s;
    }
    #loading.done { opacity: 0; }

    @media (max-width: 560px) {
      #panel { width: 100%; }
    }
  </style>
</head>
<body>

<div id="header">
  <h1>🍷 EGS Wine Explorer</h1>
  <a href="EGS-Wine-Explorer.html">Full Explorer &rarr;</a>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="loading">Loading wine data&hellip;</div>
  <div id="stats"></div>
  <div id="hint">Hover a country &middot; click to explore its wines</div>

  <div id="panel">
    <div id="panel-header">
      <div id="panel-flag">🍷</div>
      <div id="panel-meta">
        <h2 id="panel-name">—</h2>
        <p  id="panel-stats"></p>
      </div>
      <div id="panel-close" title="Close" onclick="closePanel()">✕</div>
    </div>
    <div id="panel-body"></div>
    <a id="explore-btn" href="EGS-Wine-Explorer.html">Browse in Full Explorer &rarr;</a>
  </div>
</div>

<!-- Data files -->
<script src="EGS-Wine-Data.js"></script>
<script src="EGS-Alko-Wines.js"></script>
<script src="EGS-SB-Wines.js"></script>
<script src="EGS-VM-Wines.js"></script>
<script src="EGS-Superiore-Wines.js"></script>
<script src="EGS-Millesima-Wines.js"></script>
<script src="EGS-Vinissimus-Wines.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script>
// ── Merge all data sources ─────────────────────────────────────────────────
if (typeof mergeAlkoData       === 'function') mergeAlkoData();
if (typeof mergeSbData         === 'function') mergeSbData();
if (typeof mergeVmData         === 'function') mergeVmData();
if (typeof mergeSuperioreData  === 'function') mergeSuperioreData();
if (typeof mergeMillesimaData  === 'function') mergeMillesimaData();
if (typeof mergeVinissimusData === 'function') mergeVinissimusData();

// ── ISO 3166-1 numeric → our country ID(s) ────────────────────────────────
// Values can be a string or array of strings (same country, different IDs across sources)
var ISO_TO_IDS = {
  '004': null,
  '008': null,
  '012': 'algeria',
  '024': null,
  '032': 'argentina',
  '036': 'australia',
  '040': 'austria',
  '051': 'armenia',
  '052': 'barbados',
  '056': 'belgium',
  '068': 'bolivia',
  '070': null,
  '076': ['brasil','brazil'],
  '100': 'bulgaria',
  '116': null,
  '120': null,
  '124': 'canada',
  '144': null,
  '152': 'chile',
  '156': 'china',
  '170': 'colombia',
  '178': null,
  '180': null,
  '191': 'croatia',
  '192': null,
  '196': 'cyprus',
  '203': 'czech-republic',
  '208': 'denmark',
  '214': null,
  '218': null,
  '231': 'ethiopia',
  '246': 'finland',
  '250': 'france',
  '268': 'georgia',
  '276': 'germany',
  '288': null,
  '300': 'greece',
  '320': null,
  '324': null,
  '332': null,
  '340': null,
  '348': 'hungary',
  '356': 'india',
  '360': 'indonesia',
  '364': null,
  '368': null,
  '372': 'ireland',
  '376': 'israel',
  '380': 'italy',
  '392': 'japan',
  '398': 'kazakhstan',
  '404': 'kenya',
  '410': null,
  '418': null,
  '422': 'lebanon',
  '434': null,
  '442': 'luxembourg',
  '450': null,
  '454': null,
  '458': null,
  '466': null,
  '470': 'malta',
  '484': 'mexico',
  '496': null,
  '498': 'moldova',
  '504': 'morocco',
  '508': null,
  '516': 'namibia',
  '524': null,
  '528': 'netherlands',
  '554': 'new-zealand',
  '558': null,
  '562': null,
  '566': null,
  '578': 'norway',
  '586': null,
  '591': null,
  '600': null,
  '604': 'peru',
  '608': null,
  '616': 'poland',
  '620': 'portugal',
  '634': null,
  '642': 'romania',
  '643': 'russia',
  '682': null,
  '686': null,
  '688': 'serbia',
  '703': 'slovakia',
  '705': 'slovenia',
  '706': null,
  '710': 'south-africa',
  '716': 'zimbabwe',
  '724': 'spain',
  '752': 'sweden',
  '756': 'switzerland',
  '760': null,
  '764': 'thailand',
  '788': 'tunisia',
  '792': 'turkey',
  '800': null,
  '804': 'ukraine',
  '784': null,
  '818': null,
  '826': ['united-kingdom','england'],
  '840': ['usa','united-states','united-states-of-america'],
  '858': 'uruguay',
  '860': null,
  '862': 'venezuela',
  '704': null,
  '887': null,
  '894': null,
  '716': 'zimbabwe',
};

// ── Build country summary from merged DATA ─────────────────────────────────
var summary = {};   // countryId -> { id, name, flag, code, wineCount, regionCount, data }
var totalWines = 0;

(typeof DATA !== 'undefined' ? DATA : []).forEach(function(country) {
  var wc = 0;
  (country.regions || []).forEach(function(r) {
    (r.wineries || []).forEach(function(w) { wc += (w.wines || []).length; });
  });
  totalWines += wc;
  summary[country.id] = {
    id:          country.id,
    name:        country.name || country.id,
    flag:        country.flag || '🍷',
    code:        country.code || '',
    wineCount:   wc,
    regionCount: (country.regions || []).length,
    data:        country,
  };
});

// Lookup helper: ISO numeric string → summary entry (or null)
function isoToSummary(numStr) {
  var ids = ISO_TO_IDS[numStr];
  if (!ids) return null;
  if (typeof ids === 'string') ids = [ids];
  for (var i = 0; i < ids.length; i++) {
    if (summary[ids[i]]) return summary[ids[i]];
  }
  return null;
}

document.getElementById('stats').textContent =
  Object.keys(summary).length + ' countries · ' + totalWines.toLocaleString() + ' wines';

// ── Wine type colours ──────────────────────────────────────────────────────
var TYPE_COLOR = {
  red: '#7a1428', white: '#c8a84b', rose: '#c06080',
  sparkling: '#4a7a8a', sweet: '#8a5a20', fortified: '#5a2a6a',
};
function typeColor(t) { return TYPE_COLOR[t] || '#7a1428'; }

// ── Leaflet map ────────────────────────────────────────────────────────────
var map = L.map('map', {
  center: [25, 15], zoom: 2, minZoom: 1, maxZoom: 8,
  zoomControl: true,
});

// Base tiles (no labels) — our country colours are the primary visual
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://osm.org/copyright">OSM</a>',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

// ── Country polygon layer ──────────────────────────────────────────────────
var WINE_FILL    = '#7a1428';
var WINE_BORDER  = '#3a0d18';
var HOVER_FILL   = '#a82b5a';
var SELECT_FILL  = '#c9a84c';   // gold when selected
var SELECT_BDR   = '#8a6a10';
var GREY_FILL    = '#c8bfb5';
var GREY_BDR     = '#a89888';

function styleWine()   { return { fillColor: WINE_FILL,   color: WINE_BORDER, weight: 0.7, fillOpacity: 0.58, opacity: 0.9 }; }
function styleHover()  { return { fillColor: HOVER_FILL,  color: WINE_FILL,   weight: 1.5, fillOpacity: 0.82, opacity: 1   }; }
function styleSelect() { return { fillColor: SELECT_FILL, color: SELECT_BDR,  weight: 2.0, fillOpacity: 0.78, opacity: 1   }; }
function styleGrey()   { return { fillColor: GREY_FILL,   color: GREY_BDR,    weight: 0.3, fillOpacity: 0.25, opacity: 0.5 }; }

var geojsonLayer = null;
var selectedLayer = null;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(function(r) { return r.json(); })
  .then(function(world) {
    var countries = topojson.feature(world, world.objects.countries);

    geojsonLayer = L.geoJSON(countries, {
      style: function(feature) {
        var numStr = String(feature.id).padStart(3, '0');
        return isoToSummary(numStr) ? styleWine() : styleGrey();
      },
      onEachFeature: function(feature, layer) {
        var numStr = String(feature.id).padStart(3, '0');
        var cs = isoToSummary(numStr);
        if (!cs) return;   // no interaction for non-wine countries

        layer._cs = cs;

        layer.bindTooltip(
          '<span style="font-size:1.25em;vertical-align:middle">' + cs.flag + '</span>' +
          '&ensp;<strong>' + cs.name + '</strong><br>' +
          '<span style="color:#c9956a">' +
            cs.wineCount.toLocaleString() + ' wines &middot; ' +
            cs.regionCount + ' regions' +
          '</span>',
          { sticky: true, direction: 'top', offset: [0, -4] }
        );

        layer.on('mouseover', function() {
          if (this !== selectedLayer) this.setStyle(styleHover());
          this.bringToFront();
        });
        layer.on('mouseout', function() {
          if (this !== selectedLayer) this.setStyle(styleWine());
        });
        layer.on('click', function(e) {
          L.DomEvent.stopPropagation(e);
          openPanel(cs, this);
        });
      },
    });

    // Wine countries behind labels; grey on bottom
    geojsonLayer.addTo(map);

    // Label tiles on top so they show through
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, pane: 'shadowPane',
    }).addTo(map);

    // Done loading
    var ld = document.getElementById('loading');
    ld.classList.add('done');
    setTimeout(function() { ld.style.display = 'none'; }, 600);
  })
  .catch(function(err) {
    console.error('Failed to load world map:', err);
    document.getElementById('loading').textContent = 'Map failed to load.';
  });

// ── Panel ──────────────────────────────────────────────────────────────────
function openPanel(cs, layer) {
  if (selectedLayer && selectedLayer !== layer) {
    selectedLayer.setStyle(styleWine());
  }
  selectedLayer = layer;
  layer.setStyle(styleSelect());
  layer.bringToFront();

  document.getElementById('panel-flag').textContent  = cs.flag;
  document.getElementById('panel-name').textContent  = cs.name;
  document.getElementById('panel-stats').textContent =
    cs.wineCount.toLocaleString() + ' wines · ' + cs.regionCount + ' regions';

  buildPanelBody(cs);
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').classList.add('hidden');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (selectedLayer) {
    selectedLayer.setStyle(styleWine());
    selectedLayer = null;
  }
}

// Close panel when clicking the map background (not a country)
map.on('click', function() { closePanel(); });

function buildPanelBody(cs) {
  var body = document.getElementById('panel-body');
  body.innerHTML = '';

  var country = cs.data;

  // Regions
  addSecTitle(body, 'Regions');

  var regions = (country.regions || []).map(function(reg) {
    var cnt = 0;
    (reg.wineries || []).forEach(function(w) { cnt += (w.wines || []).length; });
    return { reg: reg, cnt: cnt };
  }).sort(function(a, b) { return b.cnt - a.cnt; });

  regions.slice(0, 15).forEach(function(rObj) {
    var reg = rObj.reg;
    var row = document.createElement('div');
    row.className = 'reg-row';
    row.innerHTML =
      '<span class="reg-name">' + (reg.icon ? reg.icon + ' ' : '') + esc(reg.name) + '</span>' +
      '<span class="reg-count">' + rObj.cnt + '</span>';
    row.addEventListener('click', function() {
      body.querySelectorAll('.reg-row').forEach(function(r) { r.classList.remove('active'); });
      row.classList.add('active');
      showRegionWines(reg, body);
    });
    body.appendChild(row);
  });

  // Top scored wines
  addSecTitle(body, 'Top Wines by Score');

  var topWines = [];
  (country.regions || []).forEach(function(reg) {
    (reg.wineries || []).forEach(function(win) {
      (win.wines || []).forEach(function(wine) {
        if (wine.score > 0) topWines.push(Object.assign({}, wine, { _region: reg.name, _producer: win.name }));
      });
    });
  });
  topWines.sort(function(a, b) { return b.score - a.score; });
  appendWineRows(body, topWines.slice(0, 8));
}

function showRegionWines(reg, body) {
  var old = body.querySelector('.rgn-wines');
  if (old) old.remove();

  var sec = document.createElement('div');
  sec.className = 'rgn-wines';
  addSecTitle(sec, (reg.icon ? reg.icon + ' ' : '') + reg.name);

  var wines = [];
  (reg.wineries || []).forEach(function(win) {
    (win.wines || []).forEach(function(wine) {
      wines.push(Object.assign({}, wine, { _region: reg.name, _producer: win.name }));
    });
  });
  wines.sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
  appendWineRows(sec, wines.slice(0, 12));

  body.appendChild(sec);
  setTimeout(function() { sec.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 40);
}

function addSecTitle(parent, text) {
  var el = document.createElement('div');
  el.className = 'sec-title';
  el.textContent = text;
  parent.appendChild(el);
}

function appendWineRows(parent, wines) {
  if (!wines.length) {
    var p = document.createElement('p');
    p.style.cssText = 'color:#8b5e3c;font-size:.80em;padding:8px 0;';
    p.textContent = 'No scored wines available.';
    parent.appendChild(p);
    return;
  }
  wines.forEach(function(wine) {
    var grapeShort = wine.grape && wine.grape !== 'Unknown'
      ? wine.grape.split(',')[0].trim() : '';
    var div = document.createElement('div');
    div.className = 'wine-row';
    div.innerHTML =
      '<div class="wine-title">' +
        '<span class="type-dot" style="background:' + typeColor(wine.type) + '"></span>' +
        esc(wine.name) +
        (wine.score ? '<span class="score-pill">' + wine.score + '</span>' : '') +
      '</div>' +
      '<div class="wine-sub">' +
        esc(wine._producer) +
        (grapeShort ? ' &middot; ' + esc(grapeShort) : '') +
        (wine.price && wine.price !== '-' ? ' &middot; ' + esc(wine.price) : '') +
      '</div>';
    parent.appendChild(div);
  });
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

</body>
</html>
